<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Safari</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; }
        .card { background: #161b22; padding: 2rem; border-radius: 20px; text-align: center; width: 100%; max-width: 450px; border: 1px solid #30363d; box-sizing: border-box; }
        h1 { color: #00ff7f; margin: 0 0 10px 0; }
        #startBtn { background: #00ff7f; color: #0d1117; border: none; padding: 20px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; }
        .log-box { margin-top: 20px; background: #000; border-radius: 10px; padding: 15px; text-align: left; border: 1px solid #333; }
        .log-title { color: #8b949e; font-size: 0.8rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        #log { font-family: monospace; font-size: 0.75rem; color: #00ff7f; height: 120px; overflow-y: auto; white-space: pre-wrap; }
        .error-detail { color: #ff6b6b; font-weight: bold; margin-top: 10px; font-size: 0.8rem; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Gemini 3.1 Live 🐸</h1>
    <div id="status" style="margin-bottom:15px; color:#8b949e;">ESTADO: LISTO</div>
    
    <button id="startBtn">Iniciar Diagnóstico</button>

    <div class="log-box">
        <div class="log-title">Consola de Eventos</div>
        <div id="log">Esperando interacción...</div>
        <div id="errorDetail" class="error-detail">Sin errores detectados todavía.</div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const logDiv = document.getElementById('log');
    const errorDetail = document.getElementById('errorDetail');
    const statusText = document.getElementById('status');

    const API_KEY = "AIzaSyAF5liAJqJRXZiR8POO8IsfJf5qOGXwszI"; 
    const MODEL = "models/gemini-3.1-flash-live-preview";
    const URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BiDiGenerateContent?key=${API_KEY}`;

    function addLog(msg) {
        const t = new Date().toLocaleTimeString();
        logDiv.innerText += `\n[${t}] ${msg}`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    startBtn.onclick = async () => {
        try {
            errorDetail.innerText = "Buscando errores...";
            addLog("Pidiendo micro...");
            await navigator.mediaDevices.getUserMedia({ audio: true });
            
            addLog("Conectando a Google...");
            const ws = new WebSocket(URL);

            ws.onopen = () => {
                statusText.innerText = "ESTADO: CONECTADO ✅";
                addLog("Canal abierto. Enviando configuración...");
                ws.send(JSON.stringify({
                    setup: { model: MODEL, generation_config: { response_modalities: ["audio"] } }
                }));
            };

            ws.onmessage = async (e) => {
                const resp = JSON.parse(e.data);
                addLog("Respuesta recibida.");
                // Si Google manda un error en el JSON
                if (resp.error) {
                    errorDetail.innerText = `ERROR DE API: ${resp.error.message} (${resp.error.status})`;
                }
            };

            ws.onerror = (err) => {
                addLog("Fallo crítico en WebSocket.");
                errorDetail.innerText = "ERROR: El servidor de Google rechazó la conexión (posible API Key inválida o región bloqueada).";
            };

            ws.onclose = (e) => {
                statusText.innerText = "ESTADO: DESCONECTADO";
                addLog(`Conexión cerrada. Código: ${e.code}`);
                if (e.code === 1006) {
                    errorDetail.innerText = "CÓDIGO 1006: Google ha cortado la llamada. Esto suele ser por una API Key que no tiene activado 'Generative Language API'.";
                }
            };

        } catch (err) {
            addLog("Error de permisos.");
            errorDetail.innerText = "ERROR: No has dado permiso al micrófono en la tablet.";
        }
    };
</script>
</body>
</html>
