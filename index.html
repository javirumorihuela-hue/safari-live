<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Anfibios 🐸</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 2rem; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #30363d; }
        h1 { color: #00ff7f; margin-bottom: 10px; }
        #actionBtn { background: #00ff7f; color: #0d1117; border: none; padding: 20px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.3s; }
        #actionBtn:disabled { background: #238636; opacity: 0.6; }
        #status { margin: 15px 0; font-weight: bold; color: #8b949e; }
    </style>
</head>
<body>

<div class="card">
    <h1>Profesor Rana 🐸</h1>
    <div id="status">PULSA PARA PREGUNTAR</div>
    <button id="actionBtn">🎙️ HABLAR</button>
</div>

<script>
    const actionBtn = document.getElementById('actionBtn');
    const statusText = document.getElementById('status');

    // TU NUEVA CLAVE
    const API_KEY = "AIzaSyCvHxJKub2AqdEgqbPxsj0DyEF_Ywhl_Mo";
    const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    let mediaRecorder;
    let audioChunks = [];

    actionBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = sendToGemini;

            mediaRecorder.start();
            statusText.innerText = "ESCUCHANDO...";
            actionBtn.innerText = "⏹️ PARAR Y ENVIAR";
            actionBtn.style.background = "#ff6b6b";
        } else {
            mediaRecorder.stop();
            statusText.innerText = "PENSANDO...";
            actionBtn.innerText = "PROCESANDO...";
            actionBtn.disabled = true;
        }
    };

    async function sendToGemini() {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            
            const payload = {
                contents: [{
                    parts: [
                        { text: "Eres un experto en anfibios para niños. Responde de forma breve y divertida por voz." },
                        { inline_data: { mime_type: "audio/webm", data: base64Audio } }
                    ]
                }],
                generationConfig: { response_modalities: ["audio"] }
            };

            try {
                const response = await fetch(MODEL_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const audioOut = data.candidates[0].content.parts.find(p => p.inline_data).inline_data.data;
                playResponse(audioOut);
            } catch (e) {
                statusText.innerText = "ERROR DE CONEXIÓN";
            } finally {
                actionBtn.disabled = false;
                actionBtn.innerText = "🎙️ HABLAR";
                actionBtn.style.background = "#00ff7f";
            }
        };
    }

    function playResponse(base64) {
        statusText.innerText = "HABLANDO...";
        const audio = new Audio("data:audio/wav;base64," + base64);
        audio.play();
        audio.onended = () => { statusText.innerText = "PULSA PARA PREGUNTAR"; };
    }
</script>
</body>
</html>
